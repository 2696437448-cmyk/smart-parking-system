server:
  port: ${PORT:8080}

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      httpclient:
        connect-timeout: ${UPSTREAM_CONNECT_TIMEOUT_MS:10000}
        response-timeout: ${UPSTREAM_TIMEOUT_MS:2500}ms
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - http://localhost:4173
              - http://localhost:5173
            allowedMethods:
              - GET
              - POST
              - OPTIONS
            allowedHeaders:
              - '*'
            exposedHeaders:
              - X-Trace-Id
            allowCredentials: false

resilience4j:
  circuitbreaker:
    instances:
      modelServiceCb:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        failureRateThreshold: 50
        waitDurationInOpenState: 8s
        automaticTransitionFromOpenToHalfOpenEnabled: true
        recordExceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - org.springframework.web.reactive.function.client.WebClientRequestException

management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,circuitbreakers,circuitbreakerevents

auth:
  jwt-secret: ${AUTH_JWT_SECRET:smart-parking-demo-secret-1234567890}
  jwt-expires-seconds: ${AUTH_JWT_EXPIRES_SECONDS:28800}
  users:
    - username: ${AUTH_OWNER_USERNAME:owner_demo}
      password: ${AUTH_OWNER_PASSWORD:demo123}
      role: OWNER
      user-id: owner-app-001
      display-name: 业主演示账号
      enabled: true
    - username: ${AUTH_ADMIN_USERNAME:admin_demo}
      password: ${AUTH_ADMIN_PASSWORD:admin123}
      role: ADMIN
      user-id: admin-console-001
      display-name: 物业演示账号
      enabled: true
