server:
  port: ${PORT:8080}

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      httpclient:
        connect-timeout: ${UPSTREAM_CONNECT_TIMEOUT_MS:10000}
        response-timeout: ${UPSTREAM_TIMEOUT_MS:2500}ms
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - http://localhost:4173
              - http://localhost:5173
            allowedMethods:
              - GET
              - POST
              - OPTIONS
            allowedHeaders:
              - '*'
            exposedHeaders:
              - X-Trace-Id
            allowCredentials: false

resilience4j:
  circuitbreaker:
    instances:
      modelServiceCb:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        failureRateThreshold: 50
        waitDurationInOpenState: 8s
        automaticTransitionFromOpenToHalfOpenEnabled: true
        recordExceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - org.springframework.web.reactive.function.client.WebClientRequestException

management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,circuitbreakers,circuitbreakerevents
