global:
  scrape_interval: 2s
  evaluation_interval: 2s

scrape_configs:
  - job_name: parking-service
    metrics_path: /metrics
    static_configs:
      - targets: ["parking-service:8081"]

  - job_name: model-service
    metrics_path: /metrics
    static_configs:
      - targets: ["model-service:8000"]

  - job_name: realtime-service
    metrics_path: /metrics
    static_configs:
      - targets: ["realtime-service:8090"]
