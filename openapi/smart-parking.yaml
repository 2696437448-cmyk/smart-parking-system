openapi: 3.0.3
info:
  title: Smart Parking API
  version: 0.3.0
  description: Step25-Step30 enhancement contract on top of the Step24 baseline.
servers:
  - url: http://localhost:8080
    description: gateway

paths:
  /api/v1/owner/reservations:
    post:
      summary: Create reservation
      parameters:
        - $ref: '#/components/parameters/XTraceId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReservationCreateRequest'
      responses:
        '200':
          description: Reservation created or idempotent replay
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservationCreateResponse'

  /api/v1/owner/recommendations:
    get:
      summary: Get owner slot recommendations
      parameters:
        - $ref: '#/components/parameters/XTraceId'
        - name: location
          in: query
          required: false
          schema:
            type: string
        - name: preferred_window
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Recommendation list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecommendationResponse'

  /api/v1/owner/orders/{order_id}:
    get:
      summary: Get owner order detail
      parameters:
        - $ref: '#/components/parameters/XTraceId'
        - name: order_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Order detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OwnerOrderDetail'

  /api/v1/owner/orders/{order_id}/complete:
    post:
      summary: Complete owner order and confirm billing
      parameters:
        - $ref: '#/components/parameters/XTraceId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - name: order_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderCompleteRequest'
      responses:
        '200':
          description: Order completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderCompleteResponse'

  /api/v1/owner/navigation/{order_id}:
    get:
      summary: Get owner navigation target
      parameters:
        - $ref: '#/components/parameters/XTraceId'
        - name: order_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Navigation target
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NavigationTarget'

  /api/v1/admin/dispatch/run:
    post:
      summary: Trigger dispatch run
      parameters:
        - $ref: '#/components/parameters/XTraceId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DispatchRunRequest'
      responses:
        '200':
          description: Dispatch accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DispatchRunResponse'

  /api/v1/admin/revenue/summary:
    get:
      summary: Get daily and regional revenue summary
      parameters:
        - $ref: '#/components/parameters/XTraceId'
        - name: date
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: region_id
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Revenue summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RevenueSummaryResponse'

  /api/v1/admin/revenue/trend:
    get:
      summary: Get admin revenue trend points
      parameters:
        - $ref: '#/components/parameters/XTraceId'
        - name: region_id
          in: query
          required: false
          schema:
            type: string
        - name: days
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: Revenue trend
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RevenueTrendResponse'

  /api/v1/admin/monitor/summary:
    get:
      summary: Get admin business monitor summary
      parameters:
        - $ref: '#/components/parameters/XTraceId'
        - name: date
          in: query
          required: false
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Monitor summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonitorSummaryResponse'

  /api/v1/admin/occupancy/trend:
    get:
      summary: Get occupancy trend points
      parameters:
        - $ref: '#/components/parameters/XTraceId'
        - name: region_id
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: Occupancy trend
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OccupancyTrendResponse'

  /api/v1/admin/forecast/compare:
    get:
      summary: Get forecast vs actual compare points
      parameters:
        - $ref: '#/components/parameters/XTraceId'
        - name: region_id
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: Forecast compare
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForecastCompareResponse'

  /internal/v1/model/predict:
    post:
      summary: Predict supply-demand gap
      parameters:
        - $ref: '#/components/parameters/XTraceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PredictRequest'
      responses:
        '200':
          description: Predicted records
          content:
            application/json:
              schema:
                type: object
                required: [records]
                properties:
                  records:
                    type: array
                    items:
                      $ref: '#/components/schemas/DemandGapRecord'

  /internal/v1/dispatch/optimize:
    post:
      summary: Optimize assignment with Hungarian algorithm
      parameters:
        - $ref: '#/components/parameters/XTraceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [requests]
              properties:
                requests:
                  type: array
                  items:
                    $ref: '#/components/schemas/DispatchRequest'
      responses:
        '200':
          description: Optimized assignments
          content:
            application/json:
              schema:
                type: object
                required: [results]
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/DispatchResult'

  /internal/v1/model/activate:
    post:
      summary: Activate model version
      parameters:
        - $ref: '#/components/parameters/XTraceId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [model_version]
              properties:
                model_version:
                  type: string
      responses:
        '200':
          description: Activated
          content:
            application/json:
              schema:
                type: object
                required: [model_version, status]
                properties:
                  model_version:
                    type: string
                  status:
                    type: string

  /internal/v1/ingest/sensor-events:
    post:
      summary: Ingest near-real sensor events
      parameters:
        - $ref: '#/components/parameters/XTraceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [events]
              properties:
                events:
                  type: array
                  items:
                    $ref: '#/components/schemas/RawSensorEvent'
      responses:
        '200':
          description: Sensor events accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestResponse'

  /internal/v1/ingest/lpr-events:
    post:
      summary: Ingest near-real LPR events
      parameters:
        - $ref: '#/components/parameters/XTraceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [events]
              properties:
                events:
                  type: array
                  items:
                    $ref: '#/components/schemas/RawLprEvent'
      responses:
        '200':
          description: LPR events accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestResponse'

  /internal/v1/ingest/resident-patterns:
    post:
      summary: Ingest near-real resident trip patterns
      parameters:
        - $ref: '#/components/parameters/XTraceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [events]
              properties:
                events:
                  type: array
                  items:
                    $ref: '#/components/schemas/RawResidentTripPattern'
      responses:
        '200':
          description: Resident patterns accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestResponse'

components:
  parameters:
    XTraceId:
      name: X-Trace-Id
      in: header
      required: true
      schema:
        type: string
      description: Cross-service trace id.
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
      description: Idempotency key for write APIs.

  schemas:
    DemandGapRecord:
      type: object
      required: [region_id, ts, supply, demand, gap]
      properties:
        region_id:
          type: string
        ts:
          type: string
          format: date-time
        supply:
          type: number
        demand:
          type: number
        gap:
          type: number

    DispatchRequest:
      type: object
      required: [order_id, user_id, preferred_window, location, constraints]
      properties:
        order_id:
          type: string
        user_id:
          type: string
        preferred_window:
          type: string
        location:
          type: string
        constraints:
          type: object
          additionalProperties: true

    DispatchResult:
      type: object
      required: [order_id, slot_id, score, eta, price, strategy]
      properties:
        order_id:
          type: string
        slot_id:
          type: string
        score:
          type: number
        eta:
          type: number
        price:
          type: number
        strategy:
          type: string

    GeoPoint:
      type: object
      required: [lat, lng, display_name]
      properties:
        lat:
          type: number
        lng:
          type: number
        display_name:
          type: string

    RouteSummary:
      type: object
      required: [distance_km, route_mode, summary, eta_minutes]
      properties:
        distance_km:
          type: number
        route_mode:
          type: string
        summary:
          type: string
        eta_minutes:
          type: integer

    BillingRule:
      type: object
      required: [timezone, unit_minutes, rounding_mode, effective_window]
      properties:
        timezone:
          type: string
        unit_minutes:
          type: integer
        rounding_mode:
          type: string
        effective_window:
          type: string

    BillingRecord:
      type: object
      required: [order_id, reservation_id, slot_id, region_id, billable_minutes, estimated_amount, final_amount, billing_status]
      properties:
        order_id:
          type: string
        reservation_id:
          type: string
        user_id:
          type: string
        slot_id:
          type: string
        region_id:
          type: string
        started_at:
          type: string
          format: date-time
        ended_at:
          type: string
          format: date-time
        billable_minutes:
          type: integer
        estimated_amount:
          type: number
        final_amount:
          type: number
        billing_status:
          type: string
        recognized_on:
          type: string

    RegionRevenueSummary:
      type: object
      required: [date, region_id, revenue_amount, order_count, utilization_rate]
      properties:
        date:
          type: string
        region_id:
          type: string
        revenue_amount:
          type: number
        order_count:
          type: integer
        utilization_rate:
          type: number

    RecommendationItem:
      type: object
      required: [slot_id, estimated_amount, eta_minutes, destination, map_url]
      properties:
        slot_id:
          type: string
        estimated_amount:
          type: number
        eta_minutes:
          type: integer
        destination:
          $ref: '#/components/schemas/GeoPoint'
        map_url:
          type: string
        slot_display_name:
          type: string
        region_label:
          type: string

    RecommendationResponse:
      type: object
      required: [location, preferred_window, billing_rule, results]
      properties:
        location:
          type: string
        preferred_window:
          type: string
        billing_rule:
          $ref: '#/components/schemas/BillingRule'
        results:
          type: array
          items:
            $ref: '#/components/schemas/RecommendationItem'

    NavigationTarget:
      type: object
      required: [order_id, slot_id, eta_minutes, map_url, destination]
      properties:
        order_id:
          type: string
        slot_id:
          type: string
        eta_minutes:
          type: integer
        map_url:
          type: string
        destination:
          $ref: '#/components/schemas/GeoPoint'
        region_label:
          type: string
        slot_display_name:
          type: string
        route_summary:
          $ref: '#/components/schemas/RouteSummary'

    ReservationCreateRequest:
      type: object
      required: [user_id, preferred_window, location]
      properties:
        user_id:
          type: string
        preferred_window:
          type: string
        location:
          type: string
        slot_id:
          type: string

    ReservationCreateResponse:
      type: object
      required: [reservation_id, status, trace_id]
      properties:
        reservation_id:
          type: string
        order_id:
          type: string
        status:
          type: string
        billing_status:
          type: string
        estimated_amount:
          type: number
        currency:
          type: string
        region_id:
          type: string
        slot_id:
          type: string
        trace_id:
          type: string

    OwnerOrderDetail:
      allOf:
        - $ref: '#/components/schemas/BillingRecord'
        - type: object
          properties:
            billing_rule:
              $ref: '#/components/schemas/BillingRule'

    OrderCompleteRequest:
      type: object
      properties:
        ended_at:
          type: string
          format: date-time

    OrderCompleteResponse:
      type: object
      required: [order_id, billing_status, estimated_amount, final_amount, billable_minutes]
      properties:
        order_id:
          type: string
        reservation_id:
          type: string
        billing_status:
          type: string
        estimated_amount:
          type: number
        final_amount:
          type: number
        billable_minutes:
          type: integer
        recognized_on:
          type: string
        currency:
          type: string
        trace_id:
          type: string

    RevenueSummaryResponse:
      type: object
      required: [date, summaries, revenue_total]
      properties:
        date:
          type: string
        region_id:
          type: string
        summaries:
          type: array
          items:
            $ref: '#/components/schemas/RegionRevenueSummary'
        revenue_total:
          type: number

    RevenueTrendPoint:
      type: object
      required: [date, revenue_amount, order_count]
      properties:
        date:
          type: string
        revenue_amount:
          type: number
        order_count:
          type: integer

    RevenueTrendResponse:
      type: object
      required: [points]
      properties:
        region_id:
          type: string
        days:
          type: integer
        points:
          type: array
          items:
            $ref: '#/components/schemas/RevenueTrendPoint'
        trace_id:
          type: string
        service:
          type: string

    OccupancyTrendPoint:
      type: object
      required: [ts, region_id, occupancy_rate, active_supply]
      properties:
        ts:
          type: string
        region_id:
          type: string
        occupancy_rate:
          type: number
        active_supply:
          type: number

    OccupancyTrendResponse:
      type: object
      required: [points]
      properties:
        region_id:
          type: string
        points:
          type: array
          items:
            $ref: '#/components/schemas/OccupancyTrendPoint'
        trace_id:
          type: string
        service:
          type: string

    ForecastComparePoint:
      type: object
      required: [ts, region_id, predicted_gap, actual_gap]
      properties:
        ts:
          type: string
        region_id:
          type: string
        predicted_gap:
          type: number
        actual_gap:
          type: number

    ForecastCompareResponse:
      type: object
      required: [points]
      properties:
        region_id:
          type: string
        points:
          type: array
          items:
            $ref: '#/components/schemas/ForecastComparePoint'
        trace_id:
          type: string
        service:
          type: string

    MonitorSummaryResponse:
      type: object
      required: [date, active_reservations, occupancy_rate, revenue_total, region_summaries, business_view]
      properties:
        date:
          type: string
        active_reservations:
          type: integer
        occupancy_rate:
          type: number
        revenue_total:
          type: number
        region_summaries:
          type: array
          items:
            $ref: '#/components/schemas/RegionRevenueSummary'
        dispatch_strategy:
          type: string
        business_view:
          type: boolean
        diagnostic_links:
          type: object
          additionalProperties:
            type: string

    DispatchRunRequest:
      type: object
      required: [trigger_reason]
      properties:
        trigger_reason:
          type: string

    DispatchRunResponse:
      type: object
      required: [job_id, accepted, trace_id]
      properties:
        job_id:
          type: string
        accepted:
          type: boolean
        trace_id:
          type: string

    PredictRequest:
      type: object
      required: [region_ids, horizon_minutes]
      properties:
        region_ids:
          type: array
          items:
            type: string
        horizon_minutes:
          type: integer

    RawSensorEvent:
      type: object
      required: [slot_id, region_id, event_ts, occupied]
      properties:
        event_id:
          type: string
        slot_id:
          type: string
        region_id:
          type: string
        event_ts:
          type: string
          format: date-time
        occupied:
          type: integer
        sensor_source:
          type: string
        quality_flag:
          type: string

    RawLprEvent:
      type: object
      required: [region_id, event_type, event_ts]
      properties:
        event_id:
          type: string
        plate:
          type: string
        plate_hash:
          type: string
        region_id:
          type: string
        event_type:
          type: string
        event_ts:
          type: string
          format: date-time

    RawResidentTripPattern:
      type: object
      required: [resident_id, home_region, weekday, hour_bucket, trip_probability]
      properties:
        raw_id:
          type: string
        resident_id:
          type: string
        home_region:
          type: string
        weekday:
          type: integer
        hour_bucket:
          type: integer
        trip_probability:
          type: number

    IngestResponse:
      type: object
      required: [accepted, table, inserted_count, trace_id, service]
      properties:
        accepted:
          type: boolean
        table:
          type: string
        inserted_count:
          type: integer
        trace_id:
          type: string
        service:
          type: string
